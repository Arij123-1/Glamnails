check-structure:
  name: 📁 Vérification de la structure
  runs-on: ubuntu-latest

  steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4

    - name: 🔎 Vérifier les fichiers requis
      run: |
        echo "Vérification de la structure du projet..."

        REQUIRED_FILES=(
          "app/html/index.html"
          "app/html/css/style.css"
          "app/js/script.js"
        )

        ALL_OK=true
        for FILE in "${REQUIRED_FILES[@]}"; do
          if [ -f "$FILE" ]; then
            echo "✅  $FILE trouvé"
          else
            echo "❌  $FILE MANQUANT"
            ALL_OK=false
          fi
        done

        if [ "$ALL_OK" = false ]; then
          echo "::error::Des fichiers requis sont manquants !"
          exit 1
        fi

        echo "✅ Tous les fichiers requis sont présents."