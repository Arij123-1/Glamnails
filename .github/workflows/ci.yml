name: CI — Validation du code

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  # ───────────────────────── HTML VALIDATION ─────────────────────────
  validate-html:
    name: 🔍 Validation HTML
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Installer html5validator
        run: pip install html5validator --quiet

      - name: ✅ Valider HTML
        run: |
          html5validator --root app/html/ --log INFO


  # ───────────────────────── CSS VALIDATION ─────────────────────────
  validate-css:
    name: 🎨 Validation CSS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: 🔧 Configurer stylelint
        run: |
          echo '{"extends":["stylelint-config-standard"]}' > .stylelintrc.json

      - name: ✅ Valider CSS
        run: |
          stylelint "app/html/css/**/*.css" --allow-empty-input


  # ───────────────────── STRUCTURE CHECK ─────────────────────────────
  check-structure:
    name: 📁 Vérification de la structure
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔎 Vérifier les fichiers essentiels
        run: |
          echo "Vérification de la structure du projet..."

          REQUIRED_FILES=(
            "app/html/index.html"
            "app/html/css/style.css"
          )

          ALL_OK=true

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ -f "$FILE" ]; then
              echo "✅  $FILE trouvé"
            else
              echo "❌  $FILE MANQUANT"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = false ]; then
            echo "::error::Structure du projet invalide"
            exit 1
          fi

          echo "✅ Structure correcte"


  # ───────────────────── DOCKER + SECURITY ─────────────────────────
  docker-build:
    name: 🐳 Build & Scan Docker Image
    runs-on: ubuntu-latest

    needs: [validate-html, validate-css, check-structure]

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t glamnails-taskflow:latest .

      - name: 🔐 Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: glamnails-taskflow:latest