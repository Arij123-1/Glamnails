# ─────────────────────────────────────────────────────────────────
#  .github/workflows/cd.yml
#  Workflow de Déploiement Continu (CD)
#
#  Ce workflow s'exécute UNIQUEMENT après que la CI ait réussi,
#  et seulement sur la branche main (push direct ou merge de PR).
#
#  Il déploie automatiquement le site sur GitHub Pages.
#
#  Prérequis :
#    1. Aller dans Settings → Pages → Source → "GitHub Actions"
#    2. Le dépôt doit être public (ou GitHub Pro pour les privés)
# ─────────────────────────────────────────────────────────────────
name: CD — Build & Test Docker

on:
  push:
    branches:
      - main   # deploy only when code is pushed to main

jobs:
  build-and-run:
    name: 🐳 Build & Run Docker
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: 🐳 Build Docker image
        run: |
          docker build -t glamnails-app .

      # 3. Run container
      - name: ▶️ Run container
        run: |
          docker run -d -p 8080:80 --name test-container glamnails-app

      # 4. Wait a bit for server to start
      - name: ⏳ Wait for server
        run: sleep 5

      # 5. Test if site is accessible
      - name: 🌐 Test website
        run: |
          curl -f http://localhost:8080 || exit 1

      # 6. Stop container
      - name: 🛑 Stop container
        run: docker stop test-container