name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          if [ ! -d "app/html" ]; then
            echo "❌ app/html missing"
            exit 1
          fi

          if [ ! -d "app/images" ]; then
            echo "❌ app/images missing"
            exit 1
          fi

          echo "✅ Structure OK"