<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlamNails - Produits & Commandes</title>

  <link rel="stylesheet" href="../css/style1.css">
</head>

<body>

<header class="header">
  <h1 class="logo">💅 GlamNails</h1>
  <nav class="nav-menu">
    <a href="index.html">Accueil</a>
    <a href="inscription.html">S'inscrire</a>
    <a href="produits.html">Produits</a>
  </nav>
</header>

<main>

<section class="section-produits">
  <h2>Catalogue de produits</h2>
  <p class="intro">
    Choisissez vos produits, indiquez la quantité puis ajoutez-les à votre commande.
  </p>

  <form id="form-commande" action="#" method="post">

    <div class="produits-grid">

      <!-- (all your product cards unchanged — they are valid 👍) -->

    </div>

  </form>
</section>

<section class="recap">
  <h2>Récapitulatif de commande</h2>

  <table class="table-recap">
    <thead>
      <tr>
        <th>Produit</th>
        <th>Quantité</th>
        <th>Prix unitaire (DT)</th>
        <th>Sous-total (DT)</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="recap-body">
      <tr class="ligne-vide">
        <td colspan="5">Aucun produit sélectionné pour le moment.</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <td colspan="3">Total général :</td>
        <td colspan="2">
          <span id="total-general">0.00</span> DT
        </td>
      </tr>
    </tfoot>
  </table>

  <div class="recap-actions">
    <button type="button" id="btn-valider" class="btn-commande">Valider la commande</button>
    <button type="button" id="btn-reset" class="btn-commande btn-secondaire">Réinitialiser</button>
  </div>

  <p id="message-confirmation"></p>
</section>

</main>

<!-- ✅ FIXED JS PATH -->
<script src="../js/script.js"></script>

</body>
</html>
