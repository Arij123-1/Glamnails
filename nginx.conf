server {
    listen 80;
    server_name localhost;

    # Standard Nginx path
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache for static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
    }

    gzip on;
    gzip_types text/css application/javascript text/html;
}